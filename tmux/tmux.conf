set -g default-terminal "tmux-256color"
set -s extended-keys on
set -as terminal-features ',xterm*:extkeys,ghostty*:extkeys'
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

set -g mouse on
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g status on
set -g status-position bottom
set -g status-style 'bg=#1f2335,fg=#c0caf5'
set -g status-left-length 40
set -g status-left '#[fg=#7aa2f7,bold]#S #[fg=#565f89]| '
set -g status-right '#[fg=#565f89]%H:%M #[fg=#7aa2f7]%d %b'

set -g window-status-format '#[fg=#565f89]#I:#W'
set -g window-status-current-format '#[fg=#c0caf5,bold]#I:#W'
set -g window-status-separator '  '

set -g pane-border-style 'fg=#3c435e'
set -g pane-active-border-style 'fg=#7aa2f7'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

if-shell 'test -x ~/.tmux/plugins/tpm/tpm' 'run ~/.tmux/plugins/tpm/tpm'
